<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界时钟小工具</title>
    <style>
        :root {
            --bg-primary: rgba(30, 30, 46, 0.95);
            --bg-secondary: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --accent: #00d4aa;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --blur: blur(20px);
            --font-display: 'JetBrains Mono', 'Consolas', monospace;
        }

        [data-theme="retro"] {
            --bg-primary: rgba(13, 17, 23, 0.98);
            --bg-secondary: rgba(126, 231, 135, 0.05);
            --text-primary: #7ee787;
            --text-secondary: #3fb950;
            --accent: #7ee787;
            --border: #30363d;
            --shadow: 0 0 20px rgba(126, 231, 135, 0.15);
            --blur: none;
        }

        [data-theme="luxury"] {
            --bg-primary: linear-gradient(135deg, rgba(26, 26, 46, 0.98) 0%, rgba(22, 33, 62, 0.98) 100%);
            --bg-secondary: rgba(212, 175, 55, 0.08);
            --text-primary: #f4e4c1;
            --text-secondary: rgba(244, 228, 193, 0.6);
            --accent: #d4af37;
            --border: rgba(212, 175, 55, 0.3);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(212, 175, 55, 0.15);
            --blur: none;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-display);
            background: transparent;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        .widget {
            width: 420px;
            min-height: 320px;
            background: var(--bg-primary);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 28px;
            position: relative;
            transition: all 0.4s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .title {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .theme-switcher {
            display: flex;
            gap: 8px;
        }

        .theme-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-btn:hover { transform: scale(1.15); }
        .theme-btn.active { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.2); }
        .theme-btn[data-theme="glass"] { background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.08)); }
        .theme-btn[data-theme="retro"] { background: #0d1117; border: 1px solid #30363d; }
        .theme-btn[data-theme="luxury"] { background: linear-gradient(135deg, #1a1a2e, #d4af37); }

        .main-clock { text-align: center; margin-bottom: 28px; }
        .local-time {
            font-size: 80px;
            font-weight: 300;
            line-height: 1;
            letter-spacing: -3px;
            background: linear-gradient(180deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.92; } }

        .local-date { font-size: 14px; color: var(--text-secondary); margin-top: 10px; letter-spacing: 1px; }
        .local-label { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 4px; margin-top: 14px; font-weight: 500; }

        .world-clocks {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }

        .clock-item {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 18px 12px;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        .clock-item:hover { border-color: var(--border); transform: translateY(-3px); }
        .clock-city { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .clock-time { font-size: 26px; font-weight: 400; color: var(--text-primary); line-height: 1; }
        .clock-offset { font-size: 10px; color: var(--accent); margin-top: 8px; font-weight: 500; }

        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 11px 22px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-display);
        }
        .btn:hover { background: var(--bg-secondary); color: var(--text-primary); border-color: var(--accent); }
        .btn svg { width: 14px; height: 14px; fill: currentColor; }

        .pin-dot {
            position: absolute;
            top: 14px;
            left: 14px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .widget.pinned .pin-dot { opacity: 1; }

        .settings-panel {
            position: absolute;
            inset: 0;
            background: var(--bg-primary);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-radius: 24px;
            padding: 28px;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.95);
            transition: all 0.3s ease;
            z-index: 10;
        }
        .settings-panel.active { opacity: 1; visibility: visible; transform: scale(1); }

        .settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .settings-title { font-size: 18px; font-weight: 500; }
        .close-btn {
            width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border);
            background: transparent; color: var(--text-secondary); cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.3s ease;
        }
        .close-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }

        .tz-list { max-height: 220px; overflow-y: auto; }
        .tz-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s ease;
        }
        .tz-item:hover { background: var(--bg-secondary); }
        .tz-item.selected { background: var(--bg-secondary); border: 1px solid var(--accent); }
        .tz-city { font-size: 14px; color: var(--text-primary); }
        .tz-zone { font-size: 11px; color: var(--text-secondary); }
        .tz-check {
            width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center; transition: all 0.2s ease;
        }
        .tz-item.selected .tz-check { background: var(--accent); border-color: var(--accent); }
        .tz-item.selected .tz-check::after { content: '✓'; color: var(--bg-primary); font-size: 12px; }

        .tz-list::-webkit-scrollbar { width: 4px; }
        .tz-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .note {
            text-align: center;
            margin-top: 12px;
            font-size: 10px;
            color: var(--text-secondary);
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="widget" id="widget" data-theme="glass">
        <div class="pin-dot"></div>

        <div class="header">
            <div class="title">World Clock</div>
            <div class="theme-switcher">
                <button class="theme-btn active" data-theme="glass" onclick="setTheme('glass')" title="极简玻璃"></button>
                <button class="theme-btn" data-theme="retro" onclick="setTheme('retro')" title="复古终端"></button>
                <button class="theme-btn" data-theme="luxury" onclick="setTheme('luxury')" title="奢华金"></button>
            </div>
        </div>

        <div class="main-clock">
            <div class="local-time" id="localTime">00:00</div>
            <div class="local-date" id="localDate">Loading...</div>
            <div class="local-label" id="localLabel">Local Time</div>
        </div>

        <div class="world-clocks" id="worldClocks"></div>

        <div class="controls">
            <button class="btn" onclick="toggleSettings()">
                <svg viewBox="0 0 24 24"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm0 6a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/></svg>
                设置时区
            </button>
            <button class="btn" onclick="togglePin()">
                <svg viewBox="0 0 24 24"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5v6h2v-6h5v-2l-2-2z"/></svg>
                <span id="pinText">置顶</span>
            </button>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <div class="settings-header">
                <div class="settings-title">选择时区</div>
                <button class="close-btn" onclick="toggleSettings()">✕</button>
            </div>
            <div class="tz-list" id="tzList"></div>
            <p class="note">最多选择 3 个时区（已有 3 个时自动替换最早的）</p>
        </div>
    </div>

    <script>
        const timezones = [
            { city: '北京', region: 'Asia/Shanghai', zone: 'UTC+8' },
            { city: '东京', region: 'Asia/Tokyo', zone: 'UTC+9' },
            { city: '纽约', region: 'America/New_York', zone: 'UTC-5' },
            { city: '伦敦', region: 'Europe/London', zone: 'UTC+0' },
            { city: '巴黎', region: 'Europe/Paris', zone: 'UTC+1' },
            { city: '悉尼', region: 'Australia/Sydney', zone: 'UTC+10' },
            { city: '迪拜', region: 'Asia/Dubai', zone: 'UTC+4' },
            { city: '新加坡', region: 'Asia/Singapore', zone: 'UTC+8' },
            { city: '洛杉矶', region: 'America/Los_Angeles', zone: 'UTC-8' },
            { city: '莫斯科', region: 'Europe/Moscow', zone: 'UTC+3' },
            { city: '孟买', region: 'Asia/Kolkata', zone: 'UTC+5:30' },
            { city: '首尔', region: 'Asia/Seoul', zone: 'UTC+9' },
        ];

        let selected = ['Asia/Tokyo', 'America/New_York', 'Europe/London'];
        let isPinned = false;

        function init() {
            loadSettings();
            updateClock();
            renderWorldClocks();
            renderTzList();
            setInterval(updateClock, 1000);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('localTime').textContent = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('localDate').textContent = now.toLocaleDateString('zh-CN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('worldClocks').querySelectorAll('.clock-item').forEach(item => {
                try {
                    item.querySelector('.clock-time').textContent = now.toLocaleTimeString('zh-CN', { timeZone: item.dataset.zone, hour: '2-digit', minute: '2-digit', hour12: false });
                } catch(e) {}
            });
        }

        function renderWorldClocks() {
            const el = document.getElementById('worldClocks');
            el.innerHTML = '';
            selected.forEach(zone => {
                const tz = timezones.find(t => t.region === zone);
                if (!tz) return;
                el.innerHTML += `<div class="clock-item" data-zone="${tz.region}"><div class="clock-city">${tz.city}</div><div class="clock-time">--:--</div><div class="clock-offset">${tz.zone}</div></div>`;
            });
        }

        function renderTzList() {
            const el = document.getElementById('tzList');
            el.innerHTML = '';
            timezones.forEach(tz => {
                const sel = selected.includes(tz.region);
                el.innerHTML += `<div class="tz-item ${sel ? 'selected' : ''}" onclick="toggleTz('${tz.region}')"><div><div class="tz-city">${tz.city}</div><div class="tz-zone">${tz.zone}</div></div><div class="tz-check"></div></div>`;
            });
        }

        function toggleTz(zone) {
            const idx = selected.indexOf(zone);
            if (idx > -1) {
                if (selected.length > 1) selected.splice(idx, 1);
            } else {
                if (selected.length >= 3) selected.shift();
                selected.push(zone);
            }
            renderTzList();
            renderWorldClocks();
            saveSettings();
        }

        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('active');
        }

        function setTheme(theme) {
            document.getElementById('widget').setAttribute('data-theme', theme);
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === theme));
            saveSettings();
        }

        function togglePin() {
            isPinned = !isPinned;
            document.getElementById('widget').classList.toggle('pinned', isPinned);
            document.getElementById('pinText').textContent = isPinned ? '取消置顶' : '置顶';
            saveSettings();
        }

        function saveSettings() {
            localStorage.setItem('worldClock', JSON.stringify({ theme: document.getElementById('widget').getAttribute('data-theme'), selected, isPinned }));
        }

        function loadSettings() {
            const s = JSON.parse(localStorage.getItem('worldClock') || '{}');
            if (s.theme) setTheme(s.theme);
            if (s.selected) selected = s.selected;
            if (s.isPinned) { isPinned = s.isPinned; document.getElementById('widget').classList.toggle('pinned', isPinned); document.getElementById('pinText').textContent = isPinned ? '取消置顶' : '置顶'; }
        }

        init();
    </script>
</body>
</html>
